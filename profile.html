<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediVault - Emergency Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body class="bg-gray-100 font-sans">

    <div class="bg-red-600 text-white text-center py-6 shadow-lg">
        <h1 class="text-3xl font-bold tracking-widest uppercase">Medical Emergency</h1>
        <p class="text-sm mt-1 opacity-90">Scan Result: MediVault ID Verified</p>
    </div>

    <div class="max-w-md mx-auto mt-8 p-6">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <div class="bg-red-50 p-6 text-center border-b border-red-100">
                <p class="text-gray-500 uppercase text-xs font-bold tracking-widest mb-1">Blood Group</p>
                <div id="displayBlood" class="text-5xl font-black text-red-600">--</div>
            </div>

            <div class="p-8 space-y-6">
                <div>
                    <p class="text-gray-400 text-xs font-bold uppercase tracking-wider">Patient Name</p>
                    <h2 id="displayName" class="text-2xl font-bold text-gray-800">Loading...</h2>
                </div>

                <div>
                    <p class="text-gray-400 text-xs font-bold uppercase tracking-wider">Known Allergies / Conditions</p>
                    <div id="displayAllergies" class="mt-2 p-3 bg-yellow-50 border border-yellow-100 rounded-lg text-gray-700 italic">
                        Fetching data...
                    </div>
                </div>

                <a id="callLink" href="#" class="flex items-center justify-center w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg text-lg">
                    📞 CALL EMERGENCY CONTACT
                </a>
            </div>
        </div>

        <p class="text-center text-gray-400 text-xs mt-8 uppercase tracking-widest">Powered by MediVault 2026</p>
    </div>

    <script>
        // 1. YOUR FIREBASE CONFIG (Reshma, make sure this matches your Firebase project!)
     const firebaseConfig = {
  apiKey: "AIzaSyB65NZX6xwwyY4SosFm2WmTf20XU1GhoSY",
  authDomain: "medivault-53661.firebaseapp.com",
  projectId: "medivault-53661",
  storageBucket: "medivault-53661.firebasestorage.app",
  messagingSenderId: "822609817285",
  appId: "1:822609817285:web:55e336ec04a30775534aac"
};

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // 2. THE LOADING FIX
        async function loadPatientData() {
            // Get the ID from the URL (e.g., ?id=123)
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('id');

            if (!userId) {
                document.getElementById('displayName').innerText = "No ID Provided";
                return;
            }

            try {
                // Look for the document in the 'users' collection
                const doc = await db.collection("users").doc(userId).get();

                if (doc.exists) {
                    const data = doc.data();
                    
                    // Match the data fields to your Firebase labels
                    document.getElementById('displayName').innerText = data.fullName || data.name || "N/A";
                    document.getElementById('displayBlood').innerText = data.bloodGroup || "--";
                    document.getElementById('displayAllergies').innerText = data.allergies || "None Reported";
                    
                    // Update the phone button link
                    if (data.emergencyContact) {
                        document.getElementById('callLink').href = "tel:" + data.emergencyContact;
                    }
                } else {
                    document.getElementById('displayName').innerText = "Patient Not Found";
                    document.getElementById('displayAllergies').innerText = "The ID in the QR code does not match our records.";
                }
            } catch (error) {
                console.error("Firebase Error:", error);
                document.getElementById('displayName').innerText = "System Error";
            }
        }

        // Run the function as soon as the page loads
        window.onload = loadPatientData;
    </script>
</body>
</html>
